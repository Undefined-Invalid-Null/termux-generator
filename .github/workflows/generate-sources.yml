name: Generate Termux Sources

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: "App type (f-droid or play-store)"
        required: false
        default: "f-droid"
        type: choice
        options:
          - f-droid
          - play-store

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Generate sources
        run: |
          chmod +x scripts/generate-sources.sh
          ./scripts/generate-sources.sh --app-type ${{ github.event.inputs.app_type }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.0
        with:
          name: termux-sources
          path: output/termux-sources/
          retention-days: 30